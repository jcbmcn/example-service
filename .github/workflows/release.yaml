name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  docker-build:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine release version
        run: echo "VERSION=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV

      - name: Set image prefix
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_PREFIX=ghcr.io/${OWNER}/example-service" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push blue image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:blue
            ${{ env.IMAGE_PREFIX }}:blue-${{ env.VERSION }}
          build-args: |
            APP_COLOR=blue

      - name: Build and push green image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:green
            ${{ env.IMAGE_PREFIX }}:green-${{ env.VERSION }}
          build-args: |
            APP_COLOR=green

      - name: Append images to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_DATA=$(curl -sSf -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${VERSION}")
          RELEASE_ID=$(echo "${RELEASE_DATA}" | jq -r '.id')
          RELEASE_BODY=$(echo "${RELEASE_DATA}" | jq -r '.body // ""')
          IMAGES_SECTION=$'Images published:\n- '"${IMAGE_PREFIX}:blue"$'\n- '"${IMAGE_PREFIX}:blue-${VERSION}"$'\n- '"${IMAGE_PREFIX}:green"$'\n- '"${IMAGE_PREFIX}:green-${VERSION}"
          UPDATED_BODY="$(printf "%s\n\n%s\n" "${RELEASE_BODY}" "${IMAGES_SECTION}")"
          curl -sSf -X PATCH -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -d "$(jq -n --arg body "${UPDATED_BODY}" '{body: $body}')"
