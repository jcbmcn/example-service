name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic_release.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic_release.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Semantic release
        id: semantic_release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Use release version
        run: |
          echo "VERSION=${{ needs.release.outputs.new_release_version }}" >> $GITHUB_ENV
          TAG="${{ needs.release.outputs.new_release_git_tag }}"
          if [ -z "${TAG}" ] || [ "${TAG}" = "null" ]; then
            TAG="v${{ needs.release.outputs.new_release_version }}"
          fi
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Set image prefix
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_PREFIX=ghcr.io/${OWNER}/example-service" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push blue image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:blue
            ${{ env.IMAGE_PREFIX }}:blue-${{ env.VERSION }}
            ${{ env.IMAGE_PREFIX }}:latest
          build-args: |
            APP_COLOR=blue

      - name: Build and push green image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:green
            ${{ env.IMAGE_PREFIX }}:green-${{ env.VERSION }}
          build-args: |
            APP_COLOR=green

      - name: Append images to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          fetch_release() {
            local tag="$1"
            curl -sSf -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${tag}"
          }

          RELEASE_DATA="$(fetch_release "${TAG}")" || {
            ALT_TAG="v${VERSION}"
            RELEASE_DATA="$(fetch_release "${ALT_TAG}")" || {
              echo "Unable to find release for tags '${TAG}' or '${ALT_TAG}'" >&2
              exit 1
            }
          }

          RELEASE_ID=$(echo "${RELEASE_DATA}" | jq -r '.id')
          RELEASE_BODY=$(echo "${RELEASE_DATA}" | jq -r '.body // ""')
          IMAGES_SECTION=$'Images published:\n- '"${IMAGE_PREFIX}:blue"$'\n- '"${IMAGE_PREFIX}:blue-${VERSION}"$'\n- '"${IMAGE_PREFIX}:green"$'\n- '"${IMAGE_PREFIX}:green-${VERSION}"
          UPDATED_BODY="$(printf "%s\n\n%s\n" "${RELEASE_BODY}" "${IMAGES_SECTION}")"
          curl -sSf -X PATCH -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -d "$(jq -n --arg body "${UPDATED_BODY}" '{body: $body}')"
