# .github/workflows/publish.yaml
name: Publish image
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.changelog.outputs.version }}
      tag: ${{ steps.changelog.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      - id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-commit: false
          skip-tag: false

  build-blue:
    needs: version
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            APP_COLOR=blue
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:blue-${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository }}:blue
            ghcr.io/${{ github.repository }}:latest
  build-green:
    needs: version
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            APP_COLOR=green
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:green-${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository }}:green

  release:
    needs: [version, build-blue, build-green]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Create/update release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          allowUpdates: true
          body: |
            Images published:
            - ghcr.io/${{ github.repository }}:blue-${{ needs.version.outputs.version }}
            - ghcr.io/${{ github.repository }}:green-${{ needs.version.outputs.version }}
