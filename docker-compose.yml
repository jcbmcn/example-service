version: "3.9"

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config", "/etc/otelcol/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  blue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_COLOR=blue
    image: supernova:blue
    container_name: supernova-blue
    ports:
      - "3001:3000"
    environment:
      - OTEL_SERVICE_NAME=example-service-blue
      - OTEL_SERVICE_NAMESPACE=example-app
      - OTEL_SERVICE_VERSION=1.1.7
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    depends_on:
      - otel-collector

  green:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_COLOR=green
    image: supernova:green
    container_name: supernova-green
    ports:
      - "3002:3000"
    environment:
      - OTEL_SERVICE_NAME=example-service-green
      - OTEL_SERVICE_NAMESPACE=example-app
      - OTEL_SERVICE_VERSION=1.1.7
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    depends_on:
      - otel-collector
