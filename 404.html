<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <style>
      :root {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background: radial-gradient(circle at 20% 20%, #0f1d33, #050b15 55%);
        color: #e6eefb;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 24px;
        text-align: center;
        max-width: 720px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      }
      .card h1 {
        margin: 0 0 10px;
        letter-spacing: 0.4px;
      }
      .card p {
        margin: 6px 0 18px;
        color: #c6d2ea;
      }
      img {
        max-width: 100%;
        height: auto;
        border-radius: 12px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
      }
      a {
        color: #8ecbff;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>404 — Lost in Space</h1>
      <p>We couldn’t find that page. You can head back home or try a known endpoint.</p>
      <img src="/404.png" alt="404 illustration" />
      <p>
        Known paths: <code>/blue</code>, <code>/green</code>, <code>/version</code>, <code>/health</code>
      </p>
      <p><a href="/">Return home</a></p>
    </div>
  </body>
</html>
